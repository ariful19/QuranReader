plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { stream ->
        keystoreProperties.load(stream)
    }
}

def readSigningValue = { propertyName, envName ->
    def envValue = System.getenv(envName)
    if (envValue != null && !envValue.trim().isEmpty()) {
        return envValue.trim()
    }

    def propertyValue = keystoreProperties.getProperty(propertyName)
    return propertyValue != null && !propertyValue.trim().isEmpty() ? propertyValue.trim() : null
}

def releaseStoreFilePath = readSigningValue("storeFile", "ANDROID_KEYSTORE_PATH")
def releaseStoreFile = releaseStoreFilePath != null ? rootProject.file(releaseStoreFilePath) : null
def releaseStorePassword = readSigningValue("storePassword", "ANDROID_KEYSTORE_PASSWORD")
def releaseKeyAlias = readSigningValue("keyAlias", "ANDROID_KEY_ALIAS")
def releaseKeyPassword = readSigningValue("keyPassword", "ANDROID_KEY_PASSWORD")

def missingReleaseSigning = []
if (releaseStoreFile == null) {
    missingReleaseSigning.add("storeFile/ANDROID_KEYSTORE_PATH")
} else if (!releaseStoreFile.exists()) {
    missingReleaseSigning.add("keystore file (${releaseStoreFile})")
}
if (releaseStorePassword == null) {
    missingReleaseSigning.add("storePassword/ANDROID_KEYSTORE_PASSWORD")
}
if (releaseKeyAlias == null) {
    missingReleaseSigning.add("keyAlias/ANDROID_KEY_ALIAS")
}
if (releaseKeyPassword == null) {
    missingReleaseSigning.add("keyPassword/ANDROID_KEY_PASSWORD")
}

def hasReleaseSigning = missingReleaseSigning.isEmpty()
def isReleaseBuildRequested = gradle.startParameter.taskNames.any { taskName ->
    taskName.toLowerCase().contains("release")
}

android {
    namespace = "com.ariful.quranreader"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = "26.1.10909125"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.ariful.quranreader"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        if (hasReleaseSigning) {
            release {
                keyAlias = releaseKeyAlias
                keyPassword = releaseKeyPassword
                storeFile = releaseStoreFile
                storePassword = releaseStorePassword
            }
        }
    }

    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig = signingConfigs.release
            }
        }
    }
}

if (isReleaseBuildRequested && !hasReleaseSigning) {
    throw new GradleException(
        "Missing Android release signing configuration: ${missingReleaseSigning.join(', ')}. " +
        "Provide android/key.properties or the ANDROID_KEYSTORE_* environment variables before building a release APK."
    )
}

flutter {
    source = "../.."
}
